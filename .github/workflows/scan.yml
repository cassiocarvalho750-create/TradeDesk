name: scan

on:
  workflow_dispatch:
    inputs:
      mercado:
        description: "Mercado a varrer"
        required: false
        default: "ambos"
        type: choice
        options: ["ambos", "us", "b3", "etf"]
      quick:
        description: "Teste rápido (~40 ativos)"
        required: false
        default: false
        type: boolean
      timeframe:
        description: "Timeframe do gráfico"
        required: false
        default: "1d"
        type: choice
        options: ["1d", "2h"]
  schedule:
    - cron: "30 21 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: scan-pages
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar scanner
        env:
          MERCADO: ${{ inputs.mercado || 'ambos' }}
          QUICK:   ${{ inputs.quick || 'false' }}
          TF:      ${{ inputs.timeframe || '1d' }}
        run: |
          FLAGS="--timeframe $TF"
          if [ "$QUICK" = "true" ]; then FLAGS="$FLAGS --quick"; fi
          echo "Mercado=$MERCADO Quick=$QUICK Timeframe=$TF"
          if [ "$MERCADO" = "us" ] || [ "$MERCADO" = "ambos" ]; then
            python scanner_us.py $FLAGS || echo "scanner_us falhou (seguindo)"
          fi
          if [ "$MERCADO" = "b3" ] || [ "$MERCADO" = "ambos" ]; then
            python scanner_b3.py $FLAGS || echo "scanner_b3 falhou (seguindo)"
          fi
          if [ "$MERCADO" = "etf" ] || [ "$MERCADO" = "ambos" ]; then
            python scanner_etf.py $FLAGS || echo "scanner_etf falhou (seguindo)"
          fi

      - name: Carimbar horario e copiar resultados p/ docs/
        run: |
          mkdir -p docs
          date -u +"%Y-%m-%dT%H:%M:%SZ" > docs/ultimo_scan.txt
          for f in painel_us.json painel_b3.json painel_us_2h.json painel_b3_2h.json painel_etf.json painel_etf_2h.json \
                   scanner_us.json scanner_b3.json \
                   scanner_us_tradedesk_USA.json scanner_b3_tradedesk_BRL.json \
                   scanner_us.html scanner_b3.html \
                   scanner_us_2h.html scanner_b3_2h.html; do
            [ -f "$f" ] && cp "$f" docs/ || true
          done
          ls -la docs/

      - name: Commit dos resultados (historico)
        run: |
          git config user.name  "tradedesk-bot"
          git config user.email "actions@github.com"
          git add docs/ || true
          if git diff --staged --quiet; then
            echo "Nada novo para comitar."
          else
            git commit -m "scan: atualizacao automatica de dados [skip ci]"
            git push
          fi

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Empacotar docs/ como artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
